name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, lint & format check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [25]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: gradle

      - name: Prepare Gradle command (use wrapper if present)
        run: |
          if [ -x JobFinder/gradlew ]; then
            echo "GRADLE_CMD=./gradlew" >> $GITHUB_ENV
            chmod +x JobFinder/gradlew || true
          else
            echo "GRADLE_CMD=gradle" >> $GITHUB_ENV
            sudo apt-get update && sudo apt-get install -y gradle
          fi
        shell: bash

      - name: Spotless check
        run: $GRADLE_CMD --no-daemon spotlessCheck
        working-directory: JobFinder

      - name: Run Gradle checks (lint/tests)
        run: $GRADLE_CMD --no-daemon check
        working-directory: JobFinder

      - name: Build
        run: $GRADLE_CMD --no-daemon build
        working-directory: JobFinder
