services:
  ollama:
    build: ./docker/ollama
    container_name: jobfinder-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334

  postgres:
    image: postgres:15
    container_name: jobfinder-postgres
    environment:
      POSTGRES_DB: jobfinder
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8.6
    container_name: jobfinder-redis
    ports:
      - "6379:6379"

  backend:
    image: gradle:9.1-jdk25
    container_name: jobfinder-backend
    restart: unless-stopped
    working_dir: /workspace/JobFinder
    environment:
      GRADLE_USER_HOME: /home/gradle/.gradle
    command: sh -c "chmod +x ./gradlew && ./gradlew bootRun --no-daemon --args='--spring.profiles.active=docker'"
    depends_on:
      - postgres
      - redis
      - qdrant
      - ollama
    ports:
      - "8080:8080"
    volumes:
      - ./JobFinder:/workspace/JobFinder
      - gradle_cache:/home/gradle/.gradle
      - backend_logs:/workspace/JobFinder/logs

  frontend:
    image: node:22
    container_name: jobfinder-frontend
    working_dir: /workspace/JobFinder-front
    environment:
      VITE_PROXY_TARGET: http://jobfinder-backend:8080
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./JobFinder-front:/workspace/JobFinder-front
      - frontend_node_modules:/workspace/JobFinder-front/node_modules

volumes:
  ollama_data:
  qdrant_data:
  postgres_data:
  gradle_cache:
  backend_logs:
  frontend_node_modules:
