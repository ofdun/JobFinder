services:
  ollama:
    build: ./docker/ollama
    container_name: jobfinder-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334

  postgres:
    image: postgres:15
    container_name: jobfinder-postgres
    environment:
      POSTGRES_DB: jobfinder
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8.6
    container_name: jobfinder-redis
    ports:
      - "6379:6379"

volumes:
  ollama_data:
  qdrant_data:
  postgres_data:
