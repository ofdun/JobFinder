spring.application.name=JobFinder
app.ollama.model=mxbai-embed-large
app.ollama.url=http://ollama:11434
app.ollama.endpoint=/api/embed
app.qdrant.base=qdrant
app.qdrant.grpc-port=6334
app.qdrant.rest-port=6333
app.qdrant.use-tls=false
app.qdrant.collection-name=job-finder
app.qdrant.embedding-dimension=1024
app.jwt.secret=change-me-in-production-secret-key-at-least-32-bytes
app.jwt.access-expiration=3600000
app.jwt.refresh-expiration=604800000

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=jobfinder
spring.flyway.baseline-on-migrate=true

spring.datasource.url=jdbc:postgresql://postgres:5432/jobfinder
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.data.redis.host=redis
spring.data.redis.port=6379

logging.file.name=logs/jobfinder.log

